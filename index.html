<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Likubangwa Jay-Z Nyeliso</title>
  <meta name="description" content="Likubangwa Jay-Z Nyeliso — System Administrator & BSc Computer Science student based in Windhoek, Namibia."/>
  <meta property="og:title" content="Likubangwa Jay-Z Nyeliso | Sysadmin & IT Professional"/>
  <meta property="og:description" content="System Administrator and BSc Computer Science student specializing in Linux infrastructure, enterprise networking, and Active Directory administration."/>
  <meta property="og:type" content="website"/>
  <meta property="og:url" content="https://jay-sysadmin.github.io/nyeliso.github.io/"/>
  <meta property="og:image" content="https://jay-sysadmin.github.io/nyeliso.github.io/og-banner.svg"/>
  <meta name="google-site-verification" content="1aO533X_7m_hgY-3IqJU--73k-UkhSdxM2WnqSDgj2w"/>
  <link rel="canonical" href="https://jay-sysadmin.github.io/nyeliso.github.io/"/>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%230a0a0f'/%3E%3Ctext x='32' y='43' font-family='monospace' font-size='26' font-weight='700' fill='%2300e5ff' text-anchor='middle'%3ELN%3C/text%3E%3C/svg%3E"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --border: #1e1e2e;
      --accent: #00e5ff;
      --accent2: #7c3aed;
      --text: #e2e8f0;
      --muted: #64748b;
      --green: #10b981;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: none;
    }
    .grid-bg {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridMove 25s linear infinite;
      will-change: transform;
      z-index: 0;
    }
    @keyframes gridMove {
      0%   { transform: translateY(0); }
      100% { transform: translateY(60px); }
    }
    .glow-1 {
      position: fixed;
      width: 700px; height: 700px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,229,255,0.05) 0%, transparent 70%);
      top: -150px; right: -150px;
      z-index: 0;
      pointer-events: none;
    }
    .glow-2 {
      position: fixed;
      width: 500px; height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(124,58,237,0.07) 0%, transparent 70%);
      bottom: -100px; left: -100px;
      z-index: 0;
      pointer-events: none;
    }
    .cursor {
      position: fixed;
      width: 12px; height: 12px;
      background: var(--accent);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: width 0.2s, height 0.2s;
    }
    .cursor-ring {
      position: fixed;
      width: 36px; height: 36px;
      border: 1px solid rgba(0,229,255,0.4);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      transition: width 0.2s, height 0.2s, border-color 0.2s;
    }
    .cursor.expand      { width: 20px; height: 20px; }
    .cursor-ring.expand { width: 56px; height: 56px; border-color: rgba(0,229,255,0.7); }
    .landing {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 2rem;
      max-width: 900px;
    }
    .landing-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      color: var(--accent);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeUp 0.7s ease 0.3s forwards;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
    }
    .landing-label::before,
    .landing-label::after {
      content: '';
      width: 40px; height: 1px;
      background: var(--accent);
      opacity: 0.5;
    }
    .landing-name {
      font-size: clamp(3.5rem, 9vw, 8rem);
      font-weight: 800;
      line-height: 0.92;
      letter-spacing: -0.03em;
      margin-bottom: 1.5rem;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.5s forwards;
    }
    .landing-name .outline {
      display: block;
      color: transparent;
      -webkit-text-stroke: 1.5px rgba(0,229,255,0.35);
    }
    .landing-sub {
      font-family: 'Space Mono', monospace;
      font-size: clamp(0.75rem, 1.5vw, 0.9rem);
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 4rem;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.7s forwards;
    }
    .enter-btn {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      text-decoration: none;
      color: inherit;
      opacity: 0;
      animation: fadeUp 0.8s ease 1s forwards;
      cursor: none;
    }
    .enter-btn:hover .btn-circle { border-color: var(--accent); background: rgba(0,229,255,0.08); }
    .enter-btn:hover .btn-arrow  { transform: translateY(5px); }
    .enter-btn:hover .btn-label  { color: var(--accent); }
    .btn-circle {
      width: 72px; height: 72px;
      border-radius: 50%;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.3s, background 0.3s;
    }
    .btn-arrow {
      font-size: 1.5rem;
      color: var(--accent);
      transition: transform 0.3s;
      line-height: 1;
    }
    .btn-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      transition: color 0.3s;
    }
    .corner-tl {
      position: fixed;
      top: 2rem; left: 2.5rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      z-index: 10;
      opacity: 0;
      animation: fadeIn 1s ease 1.2s forwards;
    }
    .corner-br {
      position: fixed;
      bottom: 2rem; right: 2.5rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      z-index: 10;
      text-align: right;
      opacity: 0;
      animation: fadeIn 1s ease 1.2s forwards;
    }
    .corner-bl {
      position: fixed;
      bottom: 2rem; left: 2.5rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      z-index: 10;
      opacity: 0;
      animation: fadeIn 1s ease 1.4s forwards;
    }
    .scanline {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.1;
      transform: translateY(0);
      animation: scan 7s linear infinite;
      will-change: transform;
      z-index: 50;
      pointer-events: none;
    }
    @keyframes scan {
      0%   { transform: translateY(0); }
      100% { transform: translateY(100vh); }
    }
    .page-transition {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 9999;
      opacity: 0;
      pointer-events: none;
      will-change: opacity;
    }
    .page-transition.go {
      animation: fadeOut 0.4s ease forwards;
    }
    @keyframes fadeOut {
      0%   { opacity: 0; pointer-events: all; }
      100% { opacity: 1; pointer-events: all; }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
  </style>
</head>
<body>

  <div class="grid-bg"></div>
  <div class="glow-1"></div>
  <div class="glow-2"></div>
  <div class="scanline"></div>

  <div class="cursor" id="cursor"></div>
  <div class="cursor-ring" id="cursorRing"></div>

  <div class="corner-tl">WINDHOEK, NAMIBIA</div>
  <div class="corner-br">NUST · BSc CS · 2026</div>
  <div class="corner-bl">SYSADMIN · IT OFFICER</div>

  <div class="page-transition" id="pageTransition"></div>

  <div class="landing">
    <div class="landing-label">Welcome to</div>

    <h1 class="landing-name">
      Likubangwa
      <span class="outline">Jay-Z Nyeliso</span>
    </h1>

    <p class="landing-sub">Portfolio &amp; Lab Reports</p>

    <a class="enter-btn" href="portfolio.html" id="enterBtn">
      <div class="btn-circle">
        <span class="btn-arrow">↓</span>
      </div>
      <span class="btn-label">Enter Portfolio</span>
    </a>
  </div>

  <script>
    const cursor     = document.getElementById('cursor');
    const cursorRing = document.getElementById('cursorRing');

    document.addEventListener('mousemove', e => {
      cursor.style.left     = e.clientX + 'px';
      cursor.style.top      = e.clientY + 'px';
      cursorRing.style.left = e.clientX + 'px';
      cursorRing.style.top  = e.clientY + 'px';
    });

    const enterBtn = document.getElementById('enterBtn');

    enterBtn.addEventListener('mouseenter', () => {
      cursor.classList.add('expand');
      cursorRing.classList.add('expand');
    });

    enterBtn.addEventListener('mouseleave', () => {
      cursor.classList.remove('expand');
      cursorRing.classList.remove('expand');
    });

    enterBtn.addEventListener('click', e => {
      e.preventDefault();
      document.getElementById('pageTransition').classList.add('go');
      setTimeout(() => { window.location.href = 'portfolio.html'; }, 480);
    });
  </script>

</body>
</html>
